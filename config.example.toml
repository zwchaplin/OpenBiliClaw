# OpenBiliClaw configuration example
# Copy this file to config.toml and edit as needed.
# 首次运行如果缺少 config.toml，程序会自动基于本文件生成模板。
# 使用远程模型（OpenAI / Claude / Gemini / DeepSeek / OpenRouter）时，需要为默认 provider 填写 api_key。
# 如仅使用本地 Ollama，可将 default_provider 设为 "ollama"。

[general]
# Language for Agent output (zh / en)
language = "zh"
# Data directory (relative to project root)
data_dir = "data"

[api]
# 后端 API 监听地址。
# "0.0.0.0" = 绑定所有网卡（默认），同局域网手机可通过 /m/ 访问移动端 Web。
# "127.0.0.1" = 仅本机可访问，更安全但手机扫码打不开。
host = "0.0.0.0"
# 后端 API 监听端口。
port = 8420

[llm]
# Default LLM provider: "openai" | "claude" | "gemini" | "deepseek" | "ollama" | "openrouter"
# 这里选择的 provider 决定了运行时会检查哪一组敏感字段。
default_provider = "openai"
# 默认关闭跨 provider fallback：默认 provider 请求失败时直接报错，不再静默切到其它 provider。
fallback_enabled = false

[llm.openai]
# 若 default_provider = "openai"，api_key 必填
# 实验选项：先运行 `openbiliclaw login codex` 导入 Codex CLI 的 ChatGPT OAuth
# 凭据后，可把 auth_mode 改成 "codex_oauth"，此时 api_key 会被忽略。
# 这是非官方路径，可能因 OpenAI / Codex CLI 变更随时失效；同时必须保持
# base_url 为空或指向 OpenAI 官方 API 域名，避免把 ChatGPT token 发给第三方代理。
# 当前(2026-05)模型清单: gpt-5-nano (最便宜) / gpt-5.4-nano / gpt-5.4-mini /
#                      gpt-5.5 (旗舰 4/2026) / gpt-5.5-pro
# gpt-4o 系列已从 ChatGPT 退役但 API 仍可调
api_key = ""
model = "gpt-5-nano"
base_url = ""  # Leave empty for default, or set for compatible APIs
auth_mode = ""  # "" / "api_key" / "codex_oauth"

[llm.claude]
# 若 default_provider = "claude"，api_key 必填
# 当前(2026-05)主线: claude-opus-4-7 (旗舰) / claude-sonnet-4-6 (默认 / 1M ctx) /
#                  claude-haiku-4-5 (便宜)
api_key = ""
model = "claude-sonnet-4-6"

[llm.gemini]
# 若 default_provider = "gemini"，推荐设置 GEMINI_API_KEY / GOOGLE_API_KEY；
# 也可直接在这里填写 api_key。
# 当前(2026-05)清单: gemini-2.5-flash (默认 / 稳定) / gemini-3-flash-preview (新) /
#                 gemini-3.1-pro-preview (旗舰 / Public Preview) / gemini-3.1-flash-lite-preview (最便宜)
# 注: 3.1 Pro 当前仍为 Public Preview, 真实模型 ID 带 "-preview" 后缀,
#     需要绑定付费的 AI Studio / Vertex 项目, 免费档无法调用。
api_key = ""
model = "gemini-2.5-flash"

[llm.deepseek]
# 若 default_provider = "deepseek"，api_key 必填
api_key = ""
# 可选模型：deepseek-v4-flash（默认） / deepseek-v4-pro
# 旧名 deepseek-chat / deepseek-reasoner 将于 2026/07/24 弃用
model = "deepseek-v4-flash"
base_url = "https://api.deepseek.com"
# v4 模型支持 thinking 模式：设置 "high" 或 "max" 开启，空字符串关闭。
# 开启后会自动附带 thinking={"type": "enabled"} 请求字段。
#
# v0.3.26 默认改成空(关闭),因为当时 prompt 没 cache,每次按 32K tokens
# 预算计费,日花费被放大 5-10x。
# v0.3.31 改回 "max":配合 prompt-cache 改造(系统 prompt 100% 静态,
# DeepSeek 自动 cache 90% off 输入)+ caller 标签 + cost 观测台账,
# reasoning 带来的 LLM 标签质量提升(franchise_key / topic_group 标得更
# 准、score 更稳)抵消掉了 thinking 阶段的 token 消耗,综合下来比关闭
# 时还便宜。运行 ``openbiliclaw cost --by caller`` 看实际花费。需要再
# 关回去就改成 "" 即可。
reasoning_effort = "max"

[llm.ollama]
# Local model via Ollama（本地运行，不要求 api_key）
# base_url MUST include the /v1 suffix — OpenBiliClaw uses Ollama's
# OpenAI-compatible shim (`/v1/chat/completions`) for chat, and the
# native `/api/embeddings` route is derived by stripping that suffix.
# A bare "http://localhost:11434" makes the OpenAI SDK call
# `/chat/completions` which Ollama 404s.
# 当前 (2026-05) 推荐: qwen2.5:7b (中文好) / llama3.2 (Meta 新版) /
# gemma2 / mistral / deepseek-r1。``ollama list`` 看本地已拉的模型
model = "qwen2.5:7b"
base_url = "http://localhost:11434/v1"

[llm.openrouter]
# 若 default_provider = "openrouter"，api_key 必填
# OpenRouter 模型名格式: <vendor>/<model>,如:
#   openai/gpt-5-nano (默认) / anthropic/claude-sonnet-4-6 / google/gemini-2.5-flash
api_key = ""
model = "openai/gpt-5-nano"
base_url = "https://openrouter.ai/api/v1"
http_referer = ""
x_title = "OpenBiliClaw"

[llm.openai_compatible]
# v0.3.32+ — generic OpenAI-protocol-compatible provider. Use this for
# Groq / Together / Azure OpenAI / vLLM / self-hosted, etc. Distinct from
# [llm.openai] so cost stats / retries / billing stay separate.
#
# Examples:
#   - Groq:     base_url = "https://api.groq.com/openai/v1"
#               model = "llama-3.1-70b-versatile"
#   - Together: base_url = "https://api.together.xyz/v1"
#               model = "Qwen/Qwen2.5-72B-Instruct-Turbo"
#   - Azure:    base_url = "https://<resource>.openai.azure.com/openai/deployments/<deployment>"
#               model = "(matches Azure deployment name)"
#   - vLLM:     base_url = "http://localhost:8000/v1"
#               model = "(model loaded by vLLM)"
#
# base_url is REQUIRED — without it, this provider degrades to ``openai``
# (and would 401 against api.openai.com). The backend refuses to register
# without one and surfaces a ConfigIssue at startup.
api_key = ""
model = ""
base_url = ""

[llm.embedding]
# Embedding model for semantic similarity (topic dedup, fatigue, feedback)
#
# v0.3.32+ note: this section now owns its own ``api_key`` / ``base_url``.
# Embedding is fully decoupled from ``[llm].default_provider`` — pick the
# embedding provider, supply its credentials here, and chat traffic keeps
# using whatever ``[llm].default_provider`` points to.
#
# provider: empty = disable embedding; embedding no longer follows [llm].default_provider
#           "ollama" = local Ollama (no API key needed)
#           "openai" / "gemini" = remote embeddings
# model:    matched to provider when empty:
#             gemini → gemini-embedding-001
#             openai → text-embedding-3-small
#             ollama → bge-m3   (multilingual, ~568MB, sub-second on CPU)
#
# To enable local Ollama embedding:
#   1. install Ollama   (Mac: `brew install ollama` ; Windows: ollama.com/download)
#   2. `ollama pull bge-m3`
#   3. set `provider = "ollama"` here, or run `openbiliclaw setup-embedding`
provider = ""
# Leave model empty so the registry picks the provider-appropriate default.
# Hardcoding "gemini-embedding-001" here used to break OpenAI / Ollama paths
# (the model name only exists on Gemini's API; other backends 404 on it).
# v0.3.20+ note: the registry's per-provider defaults are
#   gemini → gemini-embedding-001
#   openai → text-embedding-3-small
#   ollama → bge-m3
model = ""
# v0.3.32+: dedicated embedding credentials. Leave empty to fall back to
# [llm.<provider>].api_key / .base_url (back-compat — emits a one-time
# WARNING; will be removed in a future release). Ollama doesn't need an
# api_key. base_url is optional for Ollama (defaults to localhost) and
# OpenAI (defaults to api.openai.com); Gemini SDK ignores it.
api_key = ""
base_url = ""
# Cosine similarity threshold: topics above this are considered "same topic"
similarity_threshold = 0.82
# 默认关闭 embedding fallback：不会自动切换 provider，也不会借用 [llm.<provider>] 凭据。
# 设为 true 后，才会尝试 ollama → gemini → openai fallback 链，并允许旧配置借用 chat-side 凭据。
fallback_enabled = false

# Per-module LLM overrides — set provider/model to use a different LLM
# for specific modules. Leave empty to inherit from [llm] defaults.
# This lets you e.g. use a cheaper model for discovery evaluation
# but a smarter model for soul profile generation.

[llm.soul]
# Soul profile generation / incremental updates (init, role/values/core delta)
provider = ""
model = ""

[llm.discovery]
# Content discovery (search query generation, domain exploration)
provider = ""
model = ""

[llm.recommendation]
# Recommendation expression generation
provider = ""
model = ""

[llm.evaluation]
# Content relevance evaluation (LLM-as-judge for discovered content)
provider = ""
model = ""

[bilibili]
# Authentication method: "cookie" | "qrcode" | "none"
# 仅允许以上取值；非法值会在运行态校验时报错。
auth_method = "cookie"
# Cookie string (from browser)
cookie = ""

[bilibili.browser]
# agent-browser executable path (leave empty for global install)
executable = ""
# Use headed mode for debugging
headed = false

# ── 通用 Web / 自定义网页源的浏览器配置 ──
# 与 [bilibili.browser] 独立：Bilibili 走 agent-browser CLI，
# 小红书 / 抖音当前走 Chrome 插件任务，不依赖这里。
[sources.browser]
# 预先启动一个 Chrome 监听 CDP 端口，可复用现有登录态；
# 仅在通用 Web / 自定义网页源需要登录态时填写：
#   chrome --remote-debugging-port=9222 --user-data-dir=$HOME/.openbiliclaw-chrome
# 然后在浏览器里登录目标网页源。留空则回落到 agent-browser（无登录态）。
cdp_url = ""
# agent-browser 回落路径是否使用 headed 模式
headed = false

# ── Bilibili discovery 开关 ──
# 设为 false 后：B 站 search / related_chain / trending / explore 不再参与后台 discovery，
# pool_source_shares 中的 bilibili 配额会被丢弃。
[sources.bilibili]
enabled = true

# ── 小红书（xhs）专用配置 ──
# 内容发现和元数据提取完全由浏览器扩展在真实登录态下完成：
# 被动收集（用户浏览时自动提取）+ 后台标签页搜索 + 创作者订阅。
# 后端不做主动爬取，避免触发风控。
[sources.xiaohongshu]
# 设为 false 后：跳过 init 的 XHS bootstrap，后端不再生成 XHS 搜索任务，
# pool_source_shares 中的 xiaohongshu 配额会被丢弃（不会让池子卡在低于目标）。
# 默认 false；init 交互式提示选 Yes、--yes-xhs 或插件设置页打开后才会写回 true。
enabled = false
# 每天后端允许入队的 Soul 驱动搜索任务数上限
daily_search_budget = 30
# 每天每位订阅创作者的抓取任务上限
daily_creator_budget = 10
# 扩展分发器两次任务之间的最小间隔（秒），进一步降低风控风险
task_interval_seconds = 45

# ── 抖音（Douyin）direct-cookie discovery 专用配置 ──
# 初始化画像仍走浏览器扩展；这里仅控制可选的后台内容发现。
# Cookie 优先读下方环境变量；未设置时会使用浏览器扩展同步到 data/douyin_cookie.json 的值。
# 不要把真实 Cookie 写进 config.toml。
[sources.douyin]
enabled = false
mode = "direct"
cookie_env = "OPENBILICLAW_DOUYIN_COOKIE"
daily_search_budget = 30
daily_hot_budget = 5
daily_feed_budget = 30
request_interval_seconds = 2

# ── YouTube 专用配置 ──
# enabled=false 时 pool_source_shares 中的 youtube 配额会被丢弃（避免池子卡在低于目标）。
# YouTube steady-state discovery 由后端 producer 独立调度 yt_search / yt_trending / yt_channel。
# 下面的 daily_*_budget 按天限制各策略执行规模；bootstrap 画像导入仍走浏览器扩展 yt_tasks。
[sources.youtube]
enabled = false
daily_search_budget = 6
daily_trending_budget = 50
daily_channel_budget = 10
request_interval_seconds = 2
# YouTube producer 两次执行之间的最小间隔；0 表示每个 refresh tick 都允许检查执行。
min_interval_minutes = 60

[scheduler]
# Enable scheduled content discovery
enabled = true
# Optional cost-saving guard for daemon-owned background LLM / embedding work.
# When true, refresh / pool precompute / account sync / speculation / proactive
# push only run while the browser extension has an active runtime-stream
# connection, plus the grace window below after the last disconnect.
# Manual CLI/API requests remain explicit and are not blocked by this switch.
pause_on_extension_disconnect = false
extension_disconnect_grace_seconds = 90
# Legacy compatibility field. The current runtime does not consume this cron;
# discovery is driven by the refresh loop, pool deficits, event thresholds, and
# per-strategy refresh intervals below.
discovery_cron = "0 */8 * * *"
# Keep at least this many fresh candidates ready in the discovery pool
# Allowed range: 1..600; each single refresh will backfill at most 60
pool_target_count = 600
# Low-frequency account sync interval for history / favorites / following
account_sync_interval_hours = 6
# --- Runtime refresh tuning ---
refresh_check_interval_seconds = 60      # Main loop poll interval; values <15 fallback
signal_event_threshold = 6               # New behavior events before search+related refresh
trending_refresh_hours = 3               # Minimum interval for trending strategy
explore_refresh_hours = 12               # Minimum interval for explore strategy
discovery_limit = 30                     # Per discovery wave limit; allowed range 1..60
proactive_push_interval_seconds = 120    # Delight/probe push loop interval; values <30 fallback
speculator_idle_interval_minutes = 30    # Idle interval before checking speculation lifecycle
# --- 猜测兴趣（Speculative Interest）调度 ---
# speculation_interval_minutes = 10   # 猜测推测运行间隔（分钟）
# speculation_ttl_days = 3            # 猜测兴趣默认存活天数
# speculation_cooldown_days = 7       # 被否定后的冷却天数
# speculation_confirmation_threshold = 3  # 确认猜测需要的正向信号数
# speculation_max_active = 5          # 最多同时活跃的猜测兴趣
# speculation_max_primary_interests = 15  # 主要兴趣域上限
# speculation_max_secondary_interests = 60  # 次要兴趣域上限
# --- 自动更新 ---
auto_update_enabled = false        # 是否自动检查并应用新版本（git pull + uv sync）
auto_update_check_interval_hours = 6  # 检查间隔（小时）

[scheduler.pool_source_shares]
# Candidate-pool source mix by platform family. The saved default 8:1:1:1
# keeps B 站 as the main source when optional platforms are enabled.
# 关掉的源（[sources.<name>].enabled = false）的配额会被自动剔除，剩余
# 源按比例重新归一化吃满 pool_target_count——所以这里写多少不重要，重要的
# 是源本身的 enabled 开关。
bilibili = 8
xiaohongshu = 1
douyin = 1
youtube = 1

[storage]
# SQLite database path
db_path = "data/openbiliclaw.db"

[logging]
# Console log level: DEBUG | INFO | WARNING | ERROR
level = "INFO"
# File log level, usually more verbose than console
file_level = "DEBUG"
# Log directory (relative to project root by default)
directory = "logs"
# Log file name inside the directory above
filename = "openbiliclaw.log"
# Rotate the active log when it exceeds this many MB (0 disables rotation).
# 启动时如果文件已经超过这个值，会把旧文件重命名为 <filename>.1 后重新开始。
# v0.3.30+ 默认从 1024 (1 GB) 降到 100 MB —— 长跑 daemon 1 GB 太大,占盘。
max_file_size_mb = 100
# Number of rotated backups to keep alongside the active file.
# 设为 1 → 磁盘占用封顶在 `max_file_size_mb * 2` MB。
backup_count = 1
# v0.3.30+ logs/ 目录里 *unmanaged* 文件(start 脚本 stdout redirect /
# 一次性 init 日志 / 旧版本残留)的总磁盘预算 MB。启动时如果整个 logs/
# 目录(含 unmanaged)超过这个值,从最老的 unmanaged 文件开始删,直到回到
# 预算内。设 0 关闭。也可以手动跑 `openbiliclaw logs-prune --apply`。
aggregate_budget_mb = 500
# 单个 unmanaged 日志文件超过这个 MB 数,启动时直接 truncate 到 0。
# 抓 backend-restart.log 这类被脚本无限 append 但项目代码控制不到的文件。
# 设 0 关闭。
unmanaged_truncate_mb = 200
# logs/ 目录里超过这个天数的 *unmanaged* 文件,启动时直接删除。设 0 关闭。
unmanaged_max_age_days = 30

[soul.preference]
# v0.3.x event-satisfaction signal.
# When true, preference analysis ignores passive negative events such as
# quick_exit (clicked then bounced in <5s). Explicit dislike feedback is
# retained as disliked_topics evidence instead of being learned as a
# positive interest.
satisfaction_filter_enabled = true
