<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discovery Module Architecture</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    padding: 40px;
    min-width: 1200px;
  }
  h1 { color: #58a6ff; font-size: 28px; margin-bottom: 8px; }
  .subtitle { color: #8b949e; font-size: 14px; margin-bottom: 40px; }

  /* ── Layout ── */
  .diagram-section { margin-bottom: 60px; }
  .section-title {
    color: #f0883e; font-size: 18px; font-weight: 600;
    margin-bottom: 20px; padding-left: 12px;
    border-left: 3px solid #f0883e;
  }

  /* ── SVG shared ── */
  svg text { font-family: -apple-system, "PingFang SC", "Noto Sans SC", monospace; }

  /* ── Legend ── */
  .legend {
    display: flex; gap: 24px; flex-wrap: wrap;
    margin-bottom: 32px; padding: 12px 16px;
    background: #161b22; border-radius: 8px; border: 1px solid #30363d;
  }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .legend-swatch {
    width: 16px; height: 16px; border-radius: 3px; flex-shrink: 0;
  }
</style>
</head>
<body>

<h1>Discovery 模块架构全景</h1>
<p class="subtitle">内容发现引擎 &mdash; 从用户画像到候选内容池的完整数据流</p>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch" style="background:#58a6ff"></div>外部输入/输出</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#f0883e"></div>LLM 调用</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#3fb950"></div>策略执行</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#bc8cff"></div>引擎编排</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#f778ba"></div>评估优化</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#8b949e"></div>数据存储</div>
</div>

<!-- ═══════════════════════════════════════════════════════════════ -->
<!-- SECTION 1: Main Discovery Pipeline                            -->
<!-- ═══════════════════════════════════════════════════════════════ -->
<div class="diagram-section">
<div class="section-title">1. 主发现管道 &mdash; 从画像到候选池</div>

<svg width="1140" height="920" viewBox="0 0 1140 920">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#484f58"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f0883e"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3fb950"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#bc8cff"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Soul Profile (input) ── -->
  <rect x="20" y="30" width="200" height="80" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="120" y="58" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="600">SoulProfile</text>
  <text x="120" y="78" text-anchor="middle" fill="#8b949e" font-size="11">interests / traits / needs</text>
  <text x="120" y="93" text-anchor="middle" fill="#8b949e" font-size="11">exploration_openness</text>

  <!-- Arrow: Profile → Engine -->
  <line x1="220" y1="70" x2="300" y2="70" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── ContentDiscoveryEngine ── -->
  <rect x="305" y="15" width="530" height="100" rx="12" fill="#1c1536" stroke="#bc8cff" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="570" y="38" text-anchor="middle" fill="#bc8cff" font-size="13" font-weight="600">ContentDiscoveryEngine.discover()</text>
  <text x="570" y="55" text-anchor="middle" fill="#8b949e" font-size="11">asyncio.gather(..., return_exceptions=True)</text>

  <!-- 4 strategy boxes inside engine -->
  <rect x="320" y="65" width="115" height="38" rx="6" fill="#0d2818" stroke="#3fb950" stroke-width="1.5"/>
  <text x="377" y="88" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">Search</text>

  <rect x="445" y="65" width="115" height="38" rx="6" fill="#0d2818" stroke="#3fb950" stroke-width="1.5"/>
  <text x="502" y="88" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">Trending</text>

  <rect x="570" y="65" width="115" height="38" rx="6" fill="#0d2818" stroke="#3fb950" stroke-width="1.5"/>
  <text x="627" y="88" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">RelatedChain</text>

  <rect x="695" y="65" width="115" height="38" rx="6" fill="#0d2818" stroke="#3fb950" stroke-width="1.5"/>
  <text x="752" y="88" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">Explore</text>

  <!-- ── External: Bilibili API ── -->
  <rect x="880" y="30" width="110" height="70" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="935" y="55" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">Bilibili API</text>
  <text x="935" y="73" text-anchor="middle" fill="#8b949e" font-size="9">search / ranking</text>
  <line x1="835" y1="70" x2="878" y2="60" stroke="#58a6ff" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4,3"/>

  <!-- ── External: XHS via Extension ── -->
  <rect x="1000" y="30" width="120" height="70" rx="10" fill="#161b22" stroke="#da3633" stroke-width="2"/>
  <text x="1060" y="50" text-anchor="middle" fill="#da3633" font-size="11" font-weight="600">XHS Extension</text>
  <text x="1060" y="68" text-anchor="middle" fill="#8b949e" font-size="8">DOM 元数据提取</text>
  <text x="1060" y="80" text-anchor="middle" fill="#8b949e" font-size="8">零后端爬取</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- XHS Ingest Lane (parallel to Bilibili)    -->
  <!-- ══════════════════════════════════════════ -->

  <!-- XHS ingest box — right side, parallel path bypassing merge/rank -->
  <rect x="940" y="150" width="180" height="170" rx="8" fill="#2a0d0d" stroke="#da3633" stroke-width="1.5"/>
  <text x="1030" y="172" text-anchor="middle" fill="#da3633" font-size="12" font-weight="600">XHS 入池通道</text>
  <text x="1030" y="188" text-anchor="middle" fill="#da3633" font-size="9">(源无关分类)</text>

  <rect x="950" y="198" width="160" height="24" rx="4" fill="#161b22" stroke="#da3633" stroke-width="1"/>
  <text x="1030" y="214" text-anchor="middle" fill="#da3633" font-size="9">_cache_xhs_notes()</text>

  <rect x="950" y="230" width="160" height="24" rx="4" fill="#1a1208" stroke="#f0883e" stroke-width="1"/>
  <text x="1030" y="246" text-anchor="middle" fill="#f0883e" font-size="9">classify_pool_backlog()</text>

  <text x="1030" y="272" text-anchor="middle" fill="#8b949e" font-size="8">asyncio.create_task</text>
  <text x="1030" y="284" text-anchor="middle" fill="#8b949e" font-size="8">Lock 防并发 LLM</text>
  <text x="1030" y="300" text-anchor="middle" fill="#8b949e" font-size="8">→ style_key / topic_group</text>
  <text x="1030" y="312" text-anchor="middle" fill="#8b949e" font-size="8">→ relevance_score</text>

  <!-- Arrow from XHS Extension to XHS lane -->
  <line x1="1060" y1="100" x2="1030" y2="148" stroke="#da3633" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow from XHS lane directly to cache (bypassing merge/rank/compress) -->
  <line x1="1030" y1="320" x2="700" y2="685" stroke="#da3633" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="900" y="510" fill="#da3633" font-size="9" transform="rotate(-40 900 510)">直接入池 (跳过 merge/rank)</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- 4 Strategy Detail Lanes                   -->
  <!-- ══════════════════════════════════════════ -->

  <!-- ── Search Lane ── -->
  <rect x="30" y="150" width="250" height="170" rx="8" fill="#0d2818" stroke="#3fb950" stroke-width="1.5"/>
  <text x="155" y="172" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="600">SearchStrategy</text>

  <!-- Step boxes -->
  <rect x="45" y="185" width="220" height="28" rx="4" fill="#1a1208" stroke="#f0883e" stroke-width="1"/>
  <text x="155" y="204" text-anchor="middle" fill="#f0883e" font-size="10">LLM: build_search_queries_prompt</text>

  <rect x="45" y="220" width="220" height="28" rx="4" fill="#161b22" stroke="#484f58" stroke-width="1"/>
  <text x="155" y="239" text-anchor="middle" fill="#c9d1d9" font-size="10">MockClient.search() &times; N queries</text>

  <rect x="45" y="255" width="220" height="28" rx="4" fill="#161b22" stroke="#484f58" stroke-width="1"/>
  <text x="155" y="274" text-anchor="middle" fill="#c9d1d9" font-size="10">_map_search_result (local pre-filter)</text>

  <rect x="45" y="290" width="220" height="28" rx="4" fill="#1a1208" stroke="#f0883e" stroke-width="1"/>
  <text x="155" y="309" text-anchor="middle" fill="#f0883e" font-size="10">LLM: evaluate_content &times; N items</text>

  <!-- intermediates label -->
  <text x="155" y="340" text-anchor="middle" fill="#8b949e" font-size="9" font-style="italic">intermediates: {queries: [...]}</text>

  <!-- ── Trending Lane ── -->
  <rect x="300" y="150" width="250" height="170" rx="8" fill="#0d2818" stroke="#3fb950" stroke-width="1.5"/>
  <text x="425" y="172" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="600">TrendingStrategy</text>

  <rect x="315" y="185" width="220" height="28" rx="4" fill="#1a1208" stroke="#f0883e" stroke-width="1"/>
  <text x="425" y="204" text-anchor="middle" fill="#f0883e" font-size="10">LLM: build_trending_rids_prompt</text>

  <rect x="315" y="220" width="220" height="28" rx="4" fill="#161b22" stroke="#484f58" stroke-width="1"/>
  <text x="425" y="239" text-anchor="middle" fill="#c9d1d9" font-size="10">MockClient.get_ranking() &times; rids</text>

  <rect x="315" y="255" width="220" height="28" rx="4" fill="#1a1208" stroke="#f0883e" stroke-width="1"/>
  <text x="425" y="274" text-anchor="middle" fill="#f0883e" font-size="10">LLM: evaluate_content &times; N items</text>

  <rect x="315" y="290" width="220" height="28" rx="4" fill="#161b22" stroke="#484f58" stroke-width="1"/>
  <text x="425" y="309" text-anchor="middle" fill="#c9d1d9" font-size="10">score &ge; 0.65 ? keep : drop</text>

  <text x="425" y="340" text-anchor="middle" fill="#8b949e" font-size="9" font-style="italic">intermediates: {rids: [0, 36, ...]}</text>

  <!-- ── RelatedChain Lane ── -->
  <rect x="570" y="150" width="250" height="170" rx="8" fill="#0d2818" stroke="#3fb950" stroke-width="1.5"/>
  <text x="695" y="172" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="600">RelatedChainStrategy</text>

  <rect x="585" y="185" width="220" height="28" rx="4" fill="#161b22" stroke="#484f58" stroke-width="1"/>
  <text x="695" y="204" text-anchor="middle" fill="#c9d1d9" font-size="10">seed: events &rarr; prefs &rarr; fallback</text>

  <rect x="585" y="220" width="220" height="28" rx="4" fill="#161b22" stroke="#484f58" stroke-width="1"/>
  <text x="695" y="239" text-anchor="middle" fill="#c9d1d9" font-size="10">BFS: get_related_videos (depth&le;2)</text>

  <rect x="585" y="255" width="220" height="28" rx="4" fill="#1a1208" stroke="#f0883e" stroke-width="1"/>
  <text x="695" y="274" text-anchor="middle" fill="#f0883e" font-size="10">LLM: evaluate_content + bonus</text>

  <rect x="585" y="290" width="220" height="28" rx="4" fill="#161b22" stroke="#484f58" stroke-width="1"/>
  <text x="695" y="309" text-anchor="middle" fill="#c9d1d9" font-size="10">score &ge; 0.65 ? keep : drop</text>

  <text x="695" y="340" text-anchor="middle" fill="#8b949e" font-size="9" font-style="italic">intermediates: {seeds: [...]}</text>

  <!-- ── Explore Lane ── -->
  <rect x="840" y="150" width="280" height="170" rx="8" fill="#0d2818" stroke="#3fb950" stroke-width="1.5"/>
  <text x="980" y="172" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="600">ExploreStrategy</text>

  <rect x="855" y="185" width="250" height="28" rx="4" fill="#1a1208" stroke="#f0883e" stroke-width="1"/>
  <text x="980" y="204" text-anchor="middle" fill="#f0883e" font-size="10">LLM: build_explore_domains_prompt</text>

  <rect x="855" y="220" width="250" height="28" rx="4" fill="#161b22" stroke="#484f58" stroke-width="1"/>
  <text x="980" y="239" text-anchor="middle" fill="#c9d1d9" font-size="10">MockClient.search() &times; domain queries</text>

  <rect x="855" y="255" width="250" height="28" rx="4" fill="#1a1208" stroke="#f0883e" stroke-width="1"/>
  <text x="980" y="274" text-anchor="middle" fill="#f0883e" font-size="10">LLM: evaluate_content + explore bonus</text>

  <rect x="855" y="290" width="250" height="28" rx="4" fill="#161b22" stroke="#484f58" stroke-width="1"/>
  <text x="980" y="309" text-anchor="middle" fill="#c9d1d9" font-size="10">score*0.75 + bonus*0.25 - penalty</text>

  <text x="980" y="340" text-anchor="middle" fill="#8b949e" font-size="9" font-style="italic">intermediates: {domains: [...]}</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- Merge & Rank Phase                        -->
  <!-- ══════════════════════════════════════════ -->

  <!-- Arrows from 4 lanes → merge -->
  <line x1="155" y1="320" x2="155" y2="380" stroke="#3fb950" stroke-width="1" marker-end="url(#arrow-green)"/>
  <line x1="425" y1="320" x2="425" y2="380" stroke="#3fb950" stroke-width="1" marker-end="url(#arrow-green)"/>
  <line x1="695" y1="320" x2="695" y2="380" stroke="#3fb950" stroke-width="1" marker-end="url(#arrow-green)"/>
  <line x1="980" y1="320" x2="890" y2="380" stroke="#3fb950" stroke-width="1" marker-end="url(#arrow-green)"/>

  <!-- Merge box -->
  <rect x="80" y="385" width="840" height="45" rx="8" fill="#1c1536" stroke="#bc8cff" stroke-width="2"/>
  <text x="500" y="405" text-anchor="middle" fill="#bc8cff" font-size="13" font-weight="600">_merge_and_rank()</text>
  <text x="500" y="422" text-anchor="middle" fill="#8b949e" font-size="10">bvid 去重 (保留高分) &rarr; 排序: tier &rarr; score &rarr; view_count</text>

  <!-- Arrow → compress -->
  <line x1="500" y1="430" x2="500" y2="460" stroke="#bc8cff" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- Compress box -->
  <rect x="80" y="465" width="840" height="55" rx="8" fill="#1c1536" stroke="#bc8cff" stroke-width="2"/>
  <text x="500" y="485" text-anchor="middle" fill="#bc8cff" font-size="13" font-weight="600">_compress_topic_repeats()</text>
  <text x="500" y="505" text-anchor="middle" fill="#8b949e" font-size="10">3 维多样性控制: topic_key 去重 &rarr; style_key 上限 &rarr; source_strategy 均分</text>

  <!-- Arrow → backfill decision -->
  <line x1="500" y1="520" x2="500" y2="555" stroke="#bc8cff" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- Backfill decision -->
  <polygon points="500,560 580,590 500,620 420,590" fill="#161b22" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="500" y="594" text-anchor="middle" fill="#bc8cff" font-size="11">count &lt; target?</text>

  <!-- Yes → backfill -->
  <line x1="580" y1="590" x2="700" y2="590" stroke="#bc8cff" stroke-width="1" marker-end="url(#arrow-purple)"/>
  <text x="640" y="583" text-anchor="middle" fill="#8b949e" font-size="10">Yes</text>

  <rect x="705" y="565" width="250" height="50" rx="8" fill="#161b22" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="830" y="585" text-anchor="middle" fill="#bc8cff" font-size="11">Backfill</text>
  <text x="830" y="602" text-anchor="middle" fill="#8b949e" font-size="9">L1: 宽松策略重跑 &rarr; L2: DB 历史缓存</text>

  <!-- Backfill loops back -->
  <path d="M 830 615 L 830 640 L 500 640 L 500 620" fill="none" stroke="#bc8cff" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-purple)"/>

  <!-- No → cache -->
  <line x1="500" y1="620" x2="500" y2="670" stroke="#bc8cff" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="515" y="648" fill="#8b949e" font-size="10">No / Done</text>

  <!-- Cache box -->
  <rect x="300" y="675" width="400" height="50" rx="8" fill="#1a1a24" stroke="#8b949e" stroke-width="2"/>
  <text x="500" y="695" text-anchor="middle" fill="#8b949e" font-size="13" font-weight="600">_cache_results() &rarr; SQLite content_cache</text>
  <text x="500" y="712" text-anchor="middle" fill="#6e7681" font-size="10">bvid + score + reason + tier + topic + style + source</text>

  <!-- Arrow → output -->
  <line x1="500" y1="725" x2="500" y2="760" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="300" y="765" width="400" height="50" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="500" y="787" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="600">list[DiscoveredContent]</text>
  <text x="500" y="804" text-anchor="middle" fill="#8b949e" font-size="10">&rarr; RecommendationEngine</text>

  <!-- ── LLM Service (side) ── -->
  <rect x="940" y="440" width="180" height="60" rx="10" fill="#1a1208" stroke="#f0883e" stroke-width="2"/>
  <text x="1030" y="465" text-anchor="middle" fill="#f0883e" font-size="13" font-weight="600">LLM Service</text>
  <text x="1030" y="483" text-anchor="middle" fill="#8b949e" font-size="10">5 个 prompt 模板</text>
  <path d="M 940 470 L 920 470 Q 910 470 910 460 L 910 300" fill="none" stroke="#f0883e" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ── Concurrency Controller (side) ── -->
  <rect x="940" y="520" width="180" height="60" rx="10" fill="#161b22" stroke="#484f58" stroke-width="1.5"/>
  <text x="1030" y="545" text-anchor="middle" fill="#c9d1d9" font-size="12">Concurrency Ctrl</text>
  <text x="1030" y="563" text-anchor="middle" fill="#8b949e" font-size="10">bilibili=2 / llm=2</text>

  <!-- Summary stats -->
  <rect x="30" y="850" width="1080" height="50" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="60" y="872" fill="#f0883e" font-size="11" font-weight="600">LLM 调用:</text>
  <text x="135" y="872" fill="#8b949e" font-size="11">Search(2) + Trending(1+N) + Related(N) + Explore(1+N) + Eval(N&times;3)</text>
  <text x="60" y="890" fill="#58a6ff" font-size="11" font-weight="600">B 站 API:</text>
  <text x="135" y="890" fill="#8b949e" font-size="11">search &times; queries + ranking &times; rids + related &times; seeds&times;depth</text>
</svg>
</div>

<!-- SECTION 2: Refresh Controller & Scheduling                    -->
<!-- ═══════════════════════════════════════════════════════════════ -->
<div class="diagram-section">
<div class="section-title">2. 刷新调度 &mdash; ContinuousRefreshController 决策流程与参数</div>

<svg width="1140" height="940" viewBox="0 0 1140 940">
  <defs>
    <marker id="arr-s" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#484f58"/>
    </marker>
    <marker id="arr-s-purple" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#bc8cff"/>
    </marker>
    <marker id="arr-s-green" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3fb950"/>
    </marker>
    <marker id="arr-s-orange" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f0883e"/>
    </marker>
