<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenBiliClaw</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-top: #0f1b32;
      --bg-bottom: #0b2f3f;
      --panel: rgba(255, 255, 255, 0.07);
      --panel-strong: rgba(255, 255, 255, 0.1);
      --line: rgba(255, 255, 255, 0.08);
      --text-main: #eef7ff;
      --text-subtle: #b8cad8;
      --text-muted: #7f93a2;
      --accent: #53d7ff;
      --accent-soft: rgba(83, 215, 255, 0.12);
      --success: #59d38c;
      --danger: #ff6f7d;
      --shadow: 0 20px 40px rgba(0, 0, 0, 0.24);
    }

    body {
      width: 380px;
      min-height: 520px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at top right, rgba(83, 215, 255, 0.18), transparent 38%),
        linear-gradient(160deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
    }

    .shell {
      display: flex;
      flex-direction: column;
      min-height: 520px;
    }

    .header {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--line);
    }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
    }

    .header p {
      margin-top: 6px;
      font-size: 12px;
      line-height: 1.5;
      color: var(--text-subtle);
    }

    .section {
      padding: 14px 18px 0;
    }

    .section-title {
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--success);
      box-shadow: 0 0 0 6px rgba(89, 211, 140, 0.16);
    }

    .status-dot.offline {
      background: var(--danger);
      box-shadow: 0 0 0 6px rgba(255, 111, 125, 0.16);
    }

    .status-text {
      font-size: 13px;
      color: var(--text-main);
    }

    .recommendation-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-bottom: 14px;
    }

    .recommendation-card {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
      outline: none;
    }

    .recommendation-card:hover,
    .recommendation-card:focus-visible {
      transform: translateY(-1px);
      border-color: rgba(83, 215, 255, 0.35);
      background: var(--panel-strong);
    }

    .recommendation-title {
      font-size: 14px;
      line-height: 1.45;
      font-weight: 700;
      color: var(--text-main);
    }

    .recommendation-meta {
      font-size: 12px;
      color: var(--text-subtle);
    }

    .topic-badge {
      align-self: flex-start;
      padding: 5px 8px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 11px;
      line-height: 1.3;
    }

    .recommendation-expression {
      font-size: 12px;
      line-height: 1.65;
      color: var(--text-subtle);
    }

    .recommendation-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 2px;
    }

    .action-button {
      border: 0;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      cursor: pointer;
    }

    .action-primary {
      background: var(--accent);
      color: #06212d;
      font-weight: 700;
    }

    .action-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-subtle);
    }

    .comment-composer {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
      padding: 10px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--line);
    }

    .comment-input {
      width: 100%;
      resize: vertical;
      min-height: 72px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(7, 18, 28, 0.48);
      color: var(--text-main);
      font: inherit;
    }

    .comment-input::placeholder {
      color: var(--text-muted);
    }

    .empty-state {
      padding: 24px 16px;
      border: 1px dashed rgba(255, 255, 255, 0.14);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      text-align: center;
    }

    .empty-state h3 {
      font-size: 14px;
      color: var(--text-main);
    }

    .empty-state p {
      margin-top: 8px;
      font-size: 12px;
      line-height: 1.6;
      color: var(--text-subtle);
    }

    .footer {
      margin-top: auto;
      padding: 14px 18px 18px;
      border-top: 1px solid var(--line);
    }

    .footer-hint {
      font-size: 11px;
      line-height: 1.6;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="header">
      <h1>OpenBiliClaw</h1>
      <p>把你最近真正会想点开的内容，先整理成一份小列表。</p>
    </div>

    <div class="section">
      <div class="section-title">连接状态</div>
      <div class="status">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">正在检查本地后端...</span>
      </div>
    </div>

    <div class="section">
      <div class="section-title">最新推荐</div>
      <div id="emptyState" class="empty-state" hidden>
        <h3 id="emptyTitle">正在获取推荐...</h3>
        <p id="emptyText">请稍等。</p>
      </div>
      <div id="recommendationList" class="recommendation-list"></div>
    </div>

    <div class="footer">
      <p id="hintText" class="footer-hint">打开 popup 后会自动检查后端状态并拉取最新推荐。</p>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
